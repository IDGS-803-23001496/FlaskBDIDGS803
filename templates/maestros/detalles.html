{% extends 'layout.html' %}
{% block container %}

<div class="flex justify-center items-center min-h-[70vh]">

  <div class="w-xl backdrop-blur-md rounded-2xl shadow-xl p-8 transition hover:shadow-2xl"
       style="background:rgba(255,240,245,0.95); border:1.5px solid #f8bbd0;">

    <div class="flex flex-col items-center text-center">

      <div class="w-28 h-28 mb-6 rounded-full 
                  flex items-center justify-center 
                  text-white text-4xl font-bold
                  shadow-lg"
           style="background:linear-gradient(135deg,#f48fb1,#e91e8c); ring:4px solid #fce4ec;">
        {{ nombre[0] }}{{ apellido[0] }}
      </div>

      <h2 class="text-2xl font-semibold" style="color:#880e4f;">
        {{ nombre }} {{ apellido }}
      </h2>

      <p class="text-sm mb-6" style="color:#f48fb1;">
        Perfil de Maestro
      </p>

      <div class="w-full space-y-3 text-left">

        <div class="flex justify-between pb-2" style="border-bottom:1px solid #f8bbd0;">
          <span class="text-sm" style="color:#f48fb1;">Correo</span>
          <span class="text-sm font-medium" style="color:#ad1457;">{{ correo }}</span>
        </div>

        <div class="flex justify-between pb-2" style="border-bottom:1px solid #f8bbd0;">
          <span class="text-sm" style="color:#f48fb1;">Matrícula</span>
          <span class="text-sm font-medium" style="color:#ad1457;">{{ matricula }}</span>
        </div>

        <div class="flex justify-between">
          <span class="text-sm" style="color:#f48fb1;">Especialidad</span>
          <span class="text-sm font-medium" style="color:#ad1457;">{{ especialidad }}</span>
        </div>

      </div>

      <div class="mt-8 w-full">
        <a href="{{ url_for('maestros.index') }}"
           class="w-full inline-flex justify-center items-center
                  px-5 py-2.5 text-white font-medium rounded-lg
                  shadow-md transform hover:-translate-y-0.5
                  transition-all duration-200
                  focus:outline-none focus:ring-2 focus:ring-pink-300"
           style="background:#e91e8c;">
          Volver al listado
        </a>
      </div>

    </div>

  </div>

</div>

{% endblock %}
