{% extends "layout.html" %}

{% block container %}
<div class="max-h-screen flex items-center justify-center py-16 px-6">
    <div class="max-w-6xl w-full">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10 lg:gap-14">

            <a href="{{ url_for('maestros.index') }}"
                class="group relative rounded-2xl overflow-hidden transition-all duration-300 transform hover:-translate-y-3"
                style="background:#fff0f5; border:2px solid #f48fb1; box-shadow:0 4px 24px rgba(244,143,177,0.18);">
                <div class="p-12 flex flex-col items-center text-center">
                    <div class="mb-8 p-6 rounded-full transition-colors duration-300"
                        style="background:#fce4ec; group-hover:background:#f8bbd0;">
                        <svg class="w-16 h-16" style="color:#e91e8c;" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM6 5a2 2 0 11-4 0 2 2 0 014 0z">
                            </path>
                        </svg>
                    </div>
                    <h2 class="text-3xl font-bold mb-3" style="color:#ad1457;">Maestros</h2>
                    <span class="inline-flex items-center font-medium transition-colors" style="color:#e91e8c;">
                        Entrar
                        <svg class="ml-3 w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7">
                            </path>
                        </svg>
                    </span>
                </div>
            </a>

            <!-- Tarjeta Alumnos -->
            <a href="{{ url_for('alumnos.index') }}"
                class="group relative rounded-2xl overflow-hidden transition-all duration-300 transform hover:-translate-y-3"
                style="background:#fff0f5; border:2px solid #f48fb1; box-shadow:0 4px 24px rgba(244,143,177,0.18);">
                <div class="p-12 flex flex-col items-center text-center">
                    <div class="mb-8 p-6 rounded-full transition-colors duration-300"
                        style="background:#fce4ec;">
                        <svg class="w-16 h-16" style="color:#e91e8c;" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                            </path>
                        </svg>
                    </div>
                    <h2 class="text-3xl font-bold mb-3" style="color:#ad1457;">Alumnos</h2>
                    <span class="inline-flex items-center font-medium transition-colors" style="color:#e91e8c;">
                        Entrar
                        <svg class="ml-3 w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7">
                            </path>
                        </svg>
                    </span>
                </div>
            </a>

            <!-- Tarjeta Cursos -->
            <a href="{{ url_for('cursos.index') }}"
                class="group relative rounded-2xl overflow-hidden transition-all duration-300 transform hover:-translate-y-3"
                style="background:#fff0f5; border:2px solid #f48fb1; box-shadow:0 4px 24px rgba(244,143,177,0.18);">
                <div class="p-12 flex flex-col items-center text-center">
                    <div class="mb-8 p-6 rounded-full transition-colors duration-300"
                        style="background:#fce4ec;">
                        <svg class="w-16 h-16" style="color:#e91e8c;" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
                            </path>
                        </svg>
                    </div>
                    <h2 class="text-3xl font-bold mb-3" style="color:#ad1457;">Cursos</h2>
                    <span class="inline-flex items-center font-medium transition-colors" style="color:#e91e8c;">
                        Entrar
                        <svg class="ml-3 w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7">
                            </path>
                        </svg>
                    </span>
                </div>
            </a>

        </div>
    </div>
</div>

{% endblock %}
